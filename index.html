<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Додо - Комбо 10 пицц (Адаптив)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap');

        :root {
            --primary: #FF6900;
            --primary-hover: #E86100;
            --bg-body: #F3F3F7;
            --bg-surface: #FFFFFF;
            --bg-secondary: #E2E2E9;
            --text-main: #000000;
            --text-gray: #5C6370;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-pill: 999px;
            --font: 'Nunito', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 10px; }
        .page-header p { color: var(--text-gray); font-size: 16px; max-width: 600px; line-height: 1.5; }

        .layout { display: flex; gap: 30px; align-items: flex-start; }
        .slots-column { flex: 1; display: flex; flex-direction: column; gap: 16px; }

        .slot-card {
            background: var(--bg-surface); border-radius: var(--radius-lg);
            padding: 20px; display: flex; gap: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04); transition: 0.3s;
        }
        .slot-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }

        .slot-img-wrap { width: 140px; height: 140px; flex-shrink: 0; position: relative; }
        .slot-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .slot-badge {
            position: absolute; top: -5px; left: -10px; background: #FFF0E6; color: var(--primary);
            font-weight: 800; font-size: 12px; padding: 4px 8px; border-radius: var(--radius-pill); z-index: 1;
        }

        .slot-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .slot-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;}
        .slot-title { font-size: 20px; font-weight: 700; line-height: 1.2;}
        .slot-desc { font-size: 13px; color: var(--text-gray); line-height: 1.4; margin-bottom: 16px; }

        .btn-replace {
            background: #FFF0E6; color: var(--primary); border: none; padding: 8px 16px;
            border-radius: var(--radius-pill); font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-replace:hover { background: #FFE4D2; }

        .slot-controls { display: flex; gap: 12px; flex-wrap: wrap; }
        
        .toggle-group {
            display: flex; background: var(--bg-secondary); border-radius: var(--radius-pill);
            padding: 2px; position: relative; flex: 1; min-width: 200px; height: 36px;
        }
        
        .toggle-slider {
            position: absolute; top: 2px; left: 2px; height: calc(100% - 4px); width: calc(50% - 2px);
            background: var(--bg-surface); border-radius: var(--radius-pill); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
        }

        .toggle-group label {
            flex: 1; text-align: center; position: relative; z-index: 2; padding: 0 10px;
            font-size: 13px; font-weight: 600; color: var(--text-gray); cursor: pointer;
            transition: color 0.2s; user-select: none; white-space: nowrap; line-height: 32px;
        }
        .toggle-group label.active { color: var(--text-main); }

        /* Десктопный чек */
        .receipt-sidebar { width: 340px; flex-shrink: 0; position: sticky; top: 40px; }
        .receipt-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
        .receipt-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
        .receipt-line { display: flex; justify-content: space-between; font-size: 15px; color: var(--text-main); margin-bottom: 12px; }
        .receipt-line.sub { font-size: 13px; color: var(--text-gray); margin-bottom: 8px; }
        .receipt-line.sub span:last-child { color: var(--text-main); font-weight: 600; }
        .receipt-group-title { font-size: 14px; font-weight: 700; margin: 16px 0 8px 0; color: var(--text-main); }
        .receipt-line.total { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--bg-secondary); font-size: 24px; font-weight: 800; }
        .receipt-note { font-size: 12px; color: var(--text-gray); line-height: 1.3; margin-top: 12px; }
        
        .btn-checkout {
            width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px;
            border-radius: var(--radius-pill); font-size: 16px; font-weight: 700; margin-top: 24px; cursor: pointer; transition: 0.2s;
        }
        .btn-checkout:hover { background: var(--primary-hover); }

        /* Мобильная нижняя панель (скрыта на ПК) */
        .mobile-bottom-bar { display: none; }

        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content {
            background: var(--bg-body); width: 950px; height: 85vh; border-radius: var(--radius-lg);
            display: flex; flex-direction: column; transform: scale(0.95); transition: 0.3s; overflow: hidden;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-header {
            padding: 20px 24px; background: var(--bg-surface); display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--bg-secondary); flex-shrink: 0;
        }
        .modal-header h2 { font-size: 22px; font-weight: 800; }
        .btn-close {
            background: var(--bg-secondary); border: none; width: 36px; height: 36px; border-radius: 50%;
            font-size: 20px; cursor: pointer; color: var(--text-gray); transition: 0.2s; display: flex; justify-content: center; align-items: center;
        }
        .btn-close:hover { background: #d1d2d6; color: #000; }

        .modal-grid { padding: 24px; overflow-y: auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .pizza-opt-card {
            background: var(--bg-surface); border-radius: var(--radius-md); padding: 16px; text-align: center;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s; display: flex; flex-direction: column; position: relative;
        }
        .pizza-opt-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .pizza-opt-card.selected { border-color: var(--primary); }
        .pizza-opt-card img { width: 130px; height: 130px; margin: 0 auto 12px; }
        .pizza-opt-card .p-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; flex: 1;}
        .pizza-opt-card .p-extra {
            background: #FFF0E6; color: var(--primary); border-radius: var(--radius-pill);
            padding: 4px 8px; font-size: 13px; font-weight: 700; display: inline-block; margin: 0 auto;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cfd0d5; border-radius: 10px; }

        /* =========================================
           АДАПТИВ (МОБИЛЬНАЯ ВЕРСИЯ)
           ========================================= */
        @media (max-width: 900px) {
            .layout { flex-direction: column; }
            .receipt-sidebar { width: 100%; position: static; }
        }

        @media (max-width: 650px) {
            body { padding: 20px 10px 100px 10px; /* Отступ снизу для mobile-bar */ }
            .page-header h1 { font-size: 26px; }
            .page-header p { font-size: 14px; }
            
            .slot-card {
                flex-direction: column;
                align-items: center;
                padding: 16px;
                gap: 12px;
            }
            .slot-img-wrap { width: 120px; height: 120px; margin: 0 auto; }
            .slot-header { flex-direction: column; align-items: center; gap: 10px; }
            .slot-title { font-size: 18px; text-align: center; }
            .btn-replace { margin: 0 auto; }
            .slot-desc { text-align: center; }
            .slot-controls { width: 100%; flex-direction: column; }
            .toggle-group { width: 100%; min-width: 100%; }

            /* Прячем кнопку покупки из десктопного чека, показываем мобильный бар */
            .receipt-card .btn-checkout { display: none; }
            
            .mobile-bottom-bar {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--bg-surface);
                padding: 16px 20px;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
                justify-content: space-between;
                align-items: center;
                z-index: 99;
                border-radius: 20px 20px 0 0;
            }
            .mobile-total-price { font-size: 22px; font-weight: 800; }
            .mobile-bottom-bar .btn-checkout { margin: 0; width: auto; padding: 12px 28px; }

            /* Модальное окно выезжает снизу (Bottom Sheet) */
            .modal-overlay { align-items: flex-end; }
            .modal-content {
                width: 100%; height: 90vh;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
            }
            .modal-overlay.active .modal-content { transform: translateY(0); }
            .modal-header { padding: 16px; }
            .modal-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px; }
            .pizza-opt-card { padding: 12px; }
            .pizza-opt-card:hover { transform: none; } /* Отключаем hover-эффект на телефонах */
            .pizza-opt-card img { width: 100px; height: 100px; }
            .pizza-opt-card .p-name { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="page-header">
        <h1>10 пицц</h1>
        <p>Великолепная десятка. 10 средних пицц на любой вкус. Для компании из 20-30 человек. Цена комбо зависит от выбранных рецептов.</p>
    </header>

    <div class="layout">

                <div class="receipt-line total">

    </div>
</div>

<!-- Мобильная залипающая панель внизу -->
<div class="mobile-bottom-bar">

        slots[index][key] = value;
        renderAll();

            el.innerHTML = `
                <div class="slot-img-wrap">
                    ${badgeHtml}
                    <img src="${pizza.img}" alt="${pizza.name}">
                </div>
                <div class="slot-info">
                    <div class="slot-header">
                        <div class="slot-title">${pizza.name}</div>
                        <button class="btn-replace" onclick="openModal(${index})">Заменить</button>
                    </div>
                    <div class="slot-desc">${pizza.desc}</div>
                    
                    <div class="slot-controls">
                        <div class="toggle-group" style="flex: 1.2;">
                            <div class="toggle-slider" style="transform: translateX(${sizePos});"></div>
                            <label class="${slot.size === 30 ? 'active' : ''}" onclick="updateSlot(${index}, 'size', 30)">30 см</label>
                            <label class="${slot.size === 35 ? 'active' : ''}" onclick="updateSlot(${index}, 'size', 35)">35 см*</label>
                        </div>

                        <div class="toggle-group" style="flex: 0.8;">
                            <div class="toggle-slider" style="transform: translateX(${doughPos});"></div>
                            <label class="${slot.dough === 'traditional' ? 'active' : ''}" onclick="updateSlot(${index}, 'dough', 'traditional')">Традиционное</label>
                            <label class="${slot.dough === 'thin' ? 'active' : ''}" onclick="updateSlot(${index}, 'dough', 'thin')">Тонкое</label>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function renderReceipt() {
        const content = document.getElementById('receipt-content');
        const totalEl = document.getElementById('receipt-total');
        const mobileTotalEl = document.getElementById('mobile-total');
        
        let total = BASE_COMBO_PRICE;
        let html = `
            <div class="receipt-line">
                <span>Базовая стоимость комбо</span>
                <span>${format(BASE_COMBO_PRICE)}</span>
            </div>
        `;

        let recipeExtras = {};
        
        slots.forEach(slot => {
            const pizza = getPizza(slot.pizzaId);
            
            if (pizza.extra > 0) {
                if (!recipeExtras[pizza.name]) recipeExtras[pizza.name] = { count: 0, cost: pizza.extra };
                recipeExtras[pizza.name].count++;
                total += pizza.extra;
            }
        });

        const extraNames = Object.keys(recipeExtras);
        if (extraNames.length > 0) {
            html += `<div class="receipt-group-title">Замена пицц:</div>`;
            extraNames.forEach(name => {
                const item = recipeExtras[name];
                const countText = item.count > 1 ? ` x${item.count}` : '';
                html += `
                    <div class="receipt-line sub">
                        <span>${name}${countText}</span>
                        <span>+${format(item.count * item.cost)}</span>
                    </div>
                `;
            });
        }

        content.innerHTML = html;
        totalEl.textContent = format(total);
        mobileTotalEl.textContent = format(total);
    }

    const modalOverlay = document.getElementById('modal-overlay');
    const modalGrid = document.getElementById('modal-grid');

    window.openModal = function(index) {
        currentEditingSlot = index;
        modalGrid.innerHTML = '';
        
        pizzas.forEach(pizza => {
            const extraHtml = pizza.extra > 0 ? `<div class="p-extra">+${pizza.extra} ₽</div>` : '';
            const isSelected = slots[currentEditingSlot].pizzaId === pizza.id;

            const card = document.createElement('div');
            card.className = `pizza-opt-card ${isSelected ? 'selected' : ''}`;
            
            card.innerHTML = `
                <img src="${pizza.img}" alt="${pizza.name}">
                <div class="p-name">${pizza.name}</div>
                ${extraHtml}
            `;
            card.onclick = () => selectPizza(pizza.id);
            modalGrid.appendChild(card);
        });

        modalOverlay.classList.add('active');
    }

    window.closeModal = function() {
        modalOverlay.classList.remove('active');
        currentEditingSlot = null;
    }

    window.selectPizza = function(pizzaId) {
        if (currentEditingSlot !== null) {
            slots[currentEditingSlot].pizzaId = pizzaId;
            slots[currentEditingSlot].size = 30; // Сброс размера на 30см при замене
            renderAll();
        }
        closeModal();
    }

    window.handleModalClick = function(e) {
        if (e.target === modalOverlay) closeModal();
    }

    function renderAll() {
        renderSlots();
        renderReceipt();
    }

    // Инициализация
    renderAll();
</script>
</body>
</html>
